<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>All Projects | Grey Mountain Mechanical</title>
    <style>
        /* Base styles */
        body { font-family: 'Segoe UI', sans-serif; background-color: #1A1F26; color: white; padding: 100px 5%; }
        nav { position: fixed; top: 30px; right: 5%; z-index: 100; }
        nav ul { display: flex; list-style: none; gap: 30px; }
        nav a { color: rgba(255, 255, 255, 0.7); text-decoration: none; text-transform: uppercase; letter-spacing: 2px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 40px; margin-top: 50px; }
        .card { background: #242B35; border-radius: 4px; overflow: hidden; cursor: pointer; }
        .card img { width: 100%; height: 250px; object-fit: cover; }
        .card-content { padding: 25px; }

        /* Modal Styles */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); backdrop-filter: blur(5px); }
        .modal-content { position: relative; margin: 2% auto; width: 80%; height: 90%; display: flex; align-items: center; justify-content: center; }
        #modal-image { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .close-btn { position: absolute; top: -40px; right: 0; font-size: 40px; cursor: pointer; color: white; z-index: 1001; }
    </style>
</head>
<body>
    <nav class="main-nav">
        <ul>
            <li><a href="index.html#home">Home</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="index.html#about">About</a></li>
            <li><a href="index.html#contact">Contact</a></li>
        </ul>
    </nav>

    <h1>Our Complete Portfolio</h1>
    
    <div class="grid">
      <!-- NOTE: Updated onclick="openImage(...)" for every card below -->
      <div class="card" onclick="openImage('Siempre.png')">
        <img src="simpre3.png" alt="Siempre Utah">
        <div class="card-content">
            <h3>Siempre Utah Reception Center</h3><p>Draper, UT | 2020 | 10,000 SF</p>
        </div>
      </div>
      
      <div class="card" onclick="openImage('hearthandhill5.png')">
        <img src="hearthandhill5.png" alt="Hearth and Hill">
        <div class="card-content">
            <h3>Hearth and Hill Restaurant</h3><p>Sugar House, UT | 2024 | 6,300 SF</p>
        </div>
      </div>
      
      <div class="card" onclick="openImage('thefront.png')">
        <img src="thefront.png" alt="The Front Climbing">
        <div class="card-content">
            <h3>The Front Climbing Addition</h3><p>Salt Lake City, UT | 2022 | 30,000 SF</p>
        </div>
      </div>

      <!-- Add more cards here following the same pattern: onclick="openImage('your-file-name.png')" -->
    </div>

    <!-- The Image Pop-up Modal -->
    <div id="image-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <img id="modal-image" src="" alt="Project Details">
        </div>
    </div>
    
    <script>
        function openImage(imagePath) {
            document.getElementById('modal-image').src = imagePath;
            document.getElementById('image-modal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('image-modal').style.display = 'none';
        }

        // Close if clicking outside the modal
        window.onclick = function(event) {
            var modal = document.getElementById('image-modal');
            if (event.target == modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
