<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grey Mountain Mechanical | HVAC & Plumbing Design</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* --- COLOR SYSTEM & BASE SETUP --- */
    :root {
      --bg-dark: #111112;          /* Deep rich charcoal */
      --bg-card: #18181c;          /* Slightly lighter charcoal for cards */
      --bg-input: #1f1f24;         /* Input field charcoal */
      --accent-copper: #cf8a3c;    /* Premium Warm Copper */
      --accent-light: #e5a85c;     /* Lighter highlighting bronze */
      --text-main: #f5f5f7;        /* Crisp, premium white */
      --text-muted: #9a9a9f;       /* Muted grey for descriptions */
      --border-thin: rgba(207, 138, 60, 0.15); /* Subtle copper-accented border */
      --nav-height: 80px;
    }

    html {
      scroll-behavior: smooth;
      scroll-padding-top: var(--nav-height); /* Prevent nav overlap during smooth scroll */
      box-sizing: border-box;
    }

    *, *:before, *:after {
      box-sizing: inherit;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-main);
      overflow-x: hidden;
      line-height: 1.6;
    }

    h1, h2, h3, h4 {
      margin: 0;
      font-weight: 600;
    }

    p {
      margin: 0 0 1rem 0;
    }

    a {
      text-decoration: none;
      color: inherit;
      transition: all 0.3s ease;
    }

    /* --- PREMIUM HELPER STYLES --- */
    .section-padding {
      padding: 6rem 5% 7rem 5%;
    }

    .reveal {
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 1.2s cubic-bezier(0.16, 1, 0.3, 1), transform 1.2s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* --- FIXED NAVIGATION BAR (RIGHT-ALIGNED) --- */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 5%;
      height: var(--nav-height);
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background-color: rgba(17, 17, 18, 0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      z-index: 1000;
      transition: background-color 0.3s ease;
    }

    .logo-container {
      display: flex;
      flex-direction: column;
    }

    .logo-main {
      font-family: 'Cinzel', serif;
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--text-main);
    }

    .logo-sub {
      font-size: 0.65rem;
      letter-spacing: 4px;
      color: var(--accent-copper);
      text-transform: uppercase;
      margin-top: -2px;
    }

    /* Floating Menu Links on Right Side */
    .nav-links {
      display: flex;
      list-style: none;
      gap: 2.5rem;
      margin: 0;
      padding: 0;
    }

    .nav-links a {
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      position: relative;
      padding: 0.5rem 0;
    }

    .nav-links a:hover, .nav-links a.active {
      color: var(--accent-copper);
    }

    /* Bottom Line Hover Transition */
    .nav-links a::after {
      content: '';
      position: absolute;
      width: 0;
      height: 2px;
      bottom: 0;
      left: 0;
      background-color: var(--accent-copper);
      transition: width 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .nav-links a:hover::after, .nav-links a.active::after {
      width: 100%;
    }

    /* Hamburger Menu for Responsive Views */
    .menu-toggle {
      display: none;
      cursor: pointer;
      flex-direction: column;
      gap: 5px;
    }

    .menu-toggle .bar {
      width: 24px;
      height: 2px;
      background-color: var(--text-main);
      transition: all 0.3s ease;
    }

    /* --- HERO SECTION WITH STAGGERED INTRO --- */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 10%;
      background: radial-gradient(circle at 80% 30%, rgba(207, 138, 60, 0.08), transparent 50%),
                  linear-gradient(135deg, #111112 0%, #17171d 100%);
      position: relative;
    }

    /* Delayed, Noticeable Text-Glide Transitions */
    .hero-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 1.5rem;
      letter-spacing: 1px;
      opacity: 0;
      transform: translateY(40px);
      animation: fadeInUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      animation-delay: 0.5s; /* Stagger start */
    }

    .hero-title span {
      color: var(--accent-copper);
    }

    .hero-subtitle {
      font-size: clamp(1rem, 2.5vw, 1.35rem);
      color: var(--text-muted);
      max-width: 600px;
      margin-bottom: 2.5rem;
      font-weight: 300;
      opacity: 0;
      transform: translateY(30px);
      animation: fadeInUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      animation-delay: 0.9s; /* Secondary delay to notice slide */
    }

    .hero-cta-container {
      display: flex;
      gap: 1.5rem;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeInUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      animation-delay: 1.3s; /* Final CTA delay */
    }

    .btn {
      padding: 1rem 2.2rem;
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      border-radius: 4px;
      cursor: pointer;
      display: inline-block;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .btn-primary {
      background-color: var(--accent-copper);
      color: var(--bg-dark);
      border: 1px solid var(--accent-copper);
    }

    .btn-primary:hover {
      background-color: transparent;
      color: var(--accent-copper);
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(207, 138, 60, 0.15);
    }

    .btn-secondary {
      background-color: transparent;
      color: var(--text-main);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .btn-secondary:hover {
      border-color: var(--accent-copper);
      color: var(--accent-copper);
      transform: translateY(-3px);
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* --- ABOUT US SECTION (SIDE BY SIDE LAYOUT) --- */
    .about {
      background-color: var(--bg-card);
    }

    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: 5rem;
      align-items: center;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* Picture Layout Frame styling */
    .about-image-wrapper {
      position: relative;
    }

    /* Profile picture on one side */
    .about-image {
      width: 100%;
      height: 500px;
      object-fit: cover;
      border-radius: 4px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      filter: grayscale(10%);
    }

    /* Visual Copper Frame Decoration */
    .about-image-wrapper::before {
      content: '';
      position: absolute;
      top: -15px;
      left: -15px;
      width: 100px;
      height: 100px;
      border-top: 3px solid var(--accent-copper);
      border-left: 3px solid var(--accent-copper);
      z-index: 1;
    }

    .about-image-wrapper::after {
      content: '';
      position: absolute;
      bottom: -15px;
      right: -15px;
      width: 100px;
      height: 100px;
      border-bottom: 3px solid var(--accent-copper);
      border-right: 3px solid var(--accent-copper);
      z-index: 1;
    }

    /* Description to the side styling */
    .about-tag {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--accent-copper);
      margin-bottom: 0.5rem;
      display: block;
    }

    .about-title {
      font-size: 2.2rem;
      margin-bottom: 1.5rem;
      line-height: 1.3;
    }

    .about-bio {
      color: var(--text-muted);
      font-size: 1rem;
      margin-bottom: 1.8rem;
    }

    .about-stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem;
    }

    .stat-item {
      padding: 1rem;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 4px;
    }

    .stat-number {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--accent-copper);
      margin-bottom: 0.2rem;
    }

    .stat-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      color: var(--text-muted);
      letter-spacing: 1px;
    }

    /* --- DYNAMIC PROJECTS CAROUSEL SECTION --- */
    .projects {
      background-color: var(--bg-dark);
      position: relative;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      max-width: 1200px;
      margin: 0 auto 3rem auto;
    }

    .section-title-wrapper h2 {
      font-size: 2.2rem;
      margin-bottom: 0.5rem;
    }

    .section-title-wrapper p {
      color: var(--text-muted);
      margin: 0;
    }

    /* Category Filter Badges */
    .project-filters {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
      max-width: 1200px;
      margin-left: auto;
      margin-right: auto;
    }

    .filter-btn {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text-muted);
      padding: 0.5rem 1.2rem;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .filter-btn:hover, .filter-btn.active {
      border-color: var(--accent-copper);
      color: var(--accent-copper);
      background: rgba(207, 138, 60, 0.05);
    }

    /* Carousel Wrapper Track system */
    .carousel-container {
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
      overflow: hidden;
      padding: 1rem 0;
    }

    .carousel-track {
      display: flex;
      gap: 24px;
      transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      will-change: transform;
    }

    /* Carousel Arrow Controls */
    .carousel-nav-btn {
      background-color: var(--bg-card);
      color: var(--text-main);
      border: 1px solid rgba(255, 255, 255, 0.1);
      width: 48px;
      height: 48px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      transition: all 0.3s ease;
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
    }

    .carousel-nav-btn:hover {
      border-color: var(--accent-copper);
      color: var(--accent-copper);
      box-shadow: 0 0 15px rgba(207, 138, 60, 0.15);
    }

    .carousel-nav-btn.prev {
      left: 10px;
    }

    .carousel-nav-btn.next {
      right: 10px;
    }

    /* Individual Project Cards styled with custom margins */
    .project-card {
      background-color: var(--bg-card);
      border: 1px solid rgba(255, 255, 255, 0.03);
      border-radius: 6px;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 520px;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .project-card:hover {
      transform: translateY(-8px);
      border-color: var(--accent-copper);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
    }

    .card-header-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .card-category {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--accent-copper);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .card-specs-sf {
      font-size: 0.75rem;
      background: rgba(207, 138, 60, 0.1);
      color: var(--accent-light);
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      font-weight: 600;
    }

    .project-card h3 {
      font-size: 1.35rem;
      line-height: 1.3;
      margin-bottom: 0.4rem;
      color: var(--text-main);
    }

    .project-card .card-location {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 1.5rem;
      font-weight: 500;
    }

    .card-content-scroll {
      flex-grow: 1;
      overflow-y: auto;
      margin-bottom: 1.5rem;
      padding-right: 0.3rem;
    }

    /* Scrollbar style inside cards */
    .card-content-scroll::-webkit-scrollbar {
      width: 3px;
    }
    .card-content-scroll::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
    }

    .card-detail {
      font-size: 0.82rem;
      margin-bottom: 1rem;
    }

    .card-detail strong {
      color: var(--text-main);
      display: block;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.2rem;
    }

    .card-detail p {
      color: var(--text-muted);
      margin: 0;
      font-weight: 400;
    }

    .card-footer-tags {
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      padding-top: 1rem;
    }

    .scope-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .scope-tags span {
      font-size: 0.68rem;
      background-color: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.05);
      color: var(--text-muted);
      padding: 0.2rem 0.5rem;
      border-radius: 3px;
    }

    /* Carousel Dots indicators */
    .carousel-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 2rem;
    }

    .carousel-dots .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: rgba(255, 255, 255, 0.15);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .carousel-dots .dot.active {
      background-color: var(--accent-copper);
      width: 24px;
      border-radius: 4px;
    }
