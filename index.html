<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grey Mountain Mechanical | HVAC Engineering Solutions</title>
    <style>
        :root {
            --primary-dark: #2A313C;
            --accent-blue: #3A4750;
            --secondary-light: #F9F9F9;
            --text-dark: #222222;
            --text-light: #FFFFFF;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: var(--text-dark); background-color: var(--secondary-light); overflow-x: hidden; }
        h1, h2, h3 { font-family: 'Georgia', serif; font-weight: normal; }

        /* Navigation */
        nav { position: fixed; top: 30px; right: 5%; z-index: 100; }
        nav ul { display: flex; list-style: none; gap: 30px; }
        nav a { color: rgba(255, 255, 255, 0.7); text-decoration: none; font-size: 0.95rem; letter-spacing: 2px; text-transform: uppercase; transition: color 0.3s ease; }
        nav a:hover { color: var(--text-light); }

        /* Snappier Hero Animation */
        .hero { height: 100vh; position: relative; background-color: var(--primary-dark); color: var(--text-light); display: flex; align-items: center; overflow: hidden; }
        .hero::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.25), rgba(0, 0, 0, 0.45)), url('Grey Mountain Render.png') no-repeat center center/cover;
            opacity: 0;
            animation: fadeAndZoom 1.5s cubic-bezier(0.4, 0, 0.2, 1) 0.5s forwards;
            z-index: 1;
        }
        @keyframes fadeAndZoom { 
            0% { opacity: 0; transform: scale(1.0); } 
            100% { opacity: 1; transform: scale(1.05); } 
        }

        .hero-content {
            position: absolute; z-index: 2; width: auto; white-space: nowrap; left: 50%; transform: translateX(-50%);
            animation: centerToLeftSmooth 1.5s cubic-bezier(0.25, 1, 0.5, 1) 0.5s forwards;
        }
        @keyframes centerToLeftSmooth {
            0% { left: 50%; transform: translateX(-50%); }
            100% { left: 8%; transform: translateX(0); }
        }
        .hero h1 { font-size: 3.5rem; letter-spacing: 4px; text-transform: uppercase; line-height: 1.1; margin-bottom: 5px; }
        .hero p { font-size: 1.3rem; letter-spacing: 3px; text-transform: uppercase; color: rgba(255, 255, 255, 0.8); }

        /* Projects Section */
        .projects-section { padding: 100px 5%; background-color: #1A1F26; color: var(--text-light); text-align: center; }
        .portfolio-btn { 
            display: inline-block; margin-top: 40px; padding: 15px 30px; background: transparent; border: 1px solid rgba(255,255,255,0.3);
            color: white; text-decoration: none; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
        }
        .portfolio-btn:hover { background: var(--accent-blue); border-color: var(--accent-blue); }

        /* Contact Form */
        .contact-section { padding: 100px 5%; background-color: #FFFFFF; max-width: 900px; margin: 0 auto; }
        .contact-form { display: flex; flex-direction: column; gap: 20px; max-width: 600px; margin: 0 auto; }
        .contact-form input, .contact-form textarea { width: 100%; padding: 15px; border: 1px solid #ccc; border-radius: 4px; }
        .contact-form button { background-color: var(--primary-dark); color: white; border: none; padding: 15px; cursor: pointer; }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <section id="home" class="hero">
        <div class="hero-content">
            <h1>Grey Mountain</h1>
            <p>Mechanical</p>
        </div>
    </section>

    <!-- ... About Section ... -->
    <section id="about" class="about-section">...</section>

    <section id="projects" class="projects-section">
        <h2>Featured Projects</h2>
        <!-- Your Carousel Code Here -->
        <a href="projects.html" class="portfolio-btn">View Full Portfolio</a>
    </section>

    <section id="contact" class="contact-section">
        <h2>Get in Touch</h2>
        <form class="contact-form" action="https://api.web3forms.com/submit" method="POST">
            <input type="hidden" name="access_key" value="5f4d0345-4041-4928-9422-c31c9921a0d8">
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="email" name="email" placeholder="Your Email Address" required>
            <input type="tel" name="phone" placeholder="Phone Number (Optional)">
            <textarea name="message" placeholder="Tell us about your project..." required></textarea>
            <button type="submit">Send Message</button>
        </form>
    </section>
</body>
</html>
