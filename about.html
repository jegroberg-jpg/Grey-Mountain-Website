    <head>
    <meta charset="UTF-8">
    <title>About | Grey Mountain Mechanical</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .about-container { max-width: 800px; margin: 40px auto; padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 30px; }
        .photo-placeholder { width: 300px; height: 300px; background-color: #3A4750; border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 4px solid #FFFFFF; }
        .bio { text-align: center; max-width: 600px; }
        /* Color Palette & Base Styles */
        body {
            background-color: #2A313C; /* Your Slate Color */
            color: #FFFFFF; /* White text for readability */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
        }

        /* Navigation Styles matching index.html */
        nav { 
            position: fixed; 
            top: 30px; 
            right: 5%; 
            z-index: 100; 
        }
        nav ul { display: flex; list-style: none; gap: 30px; margin: 0; padding: 0; }
        nav a { 
            color: rgba(255, 255, 255, 0.7); 
            text-decoration: none; 
            font-size: 0.95rem; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            transition: color 0.3s ease; 
        }
        nav a:hover { color: #FFFFFF; }

        .about-container {
            max-width: 800px;
            margin: 100px auto 40px auto; /* Increased top margin for nav */
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        .photo-placeholder {
            width: 300px;
            height: 300px;
            background-color: #3A4750; /* Slightly lighter slate for contrast */
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 4px solid #FFFFFF;
        }

        .bio {
            text-align: center;
            max-width: 600px;
        }

        h2 { color: #FFFFFF; font-family: 'Georgia', serif; }
        p { color: #FFFFFF; }
        body { background-color: #2A313C; } /* Unique body background */
        
        p { color: rgba(255, 255, 255, 0.8); }
    </style>
</head>
